# ╔══════════════════════════════════════════════════════════╗
# ║        hyprland.conf — by pryan  (0.54+ syntax)         ║
# ║     Modular config — edit individual files below        ║
# ╚══════════════════════════════════════════════════════════╝

source = ~/.config/hypr/env.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/workspaces.conf
source = ~/.config/hypr/rules.conf
source = ~/.config/hypr/colors.conf

# ── Programs ────────────────────────────────────────────────
$terminal    = ghostty
$fileManager = thunar
$menu        = rofi -show drun
$browser     = firefox
$browser2    = brave

# ── Autostart ───────────────────────────────────────────────
exec-once = bash ~/.config/hypr/scripts/wallpaper.sh
exec-once = waybar
exec-once = swaync
exec-once = hypridle
exec-once = wl-clip-persist --clipboard regular
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = swww-daemon
exec-once = hyprsession

# ── Look & Feel ─────────────────────────────────────────────
general {
    gaps_in  = 5
    gaps_out = 20
    border_size = 2

    col.active_border   = rgba(282c34aa) rgba(d1d1d1ee) 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = false
    allow_tearing    = false
    layout           = dwindle
}

decoration {
    rounding       = 10
    rounding_power = 2
    active_opacity   = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled      = true
        range        = 4
        render_power = 3
        color        = rgba(1a1a1aee)
    }

    blur {
        enabled  = true
        size     = 3
        passes   = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global,        1, 10, default
    animation = border,        1, 5.39, easeOutQuint
    animation = windows,       1, 4.79, easeOutQuint
    animation = windowsIn,     1, 4.1,  easeOutQuint, popin 87%
    animation = windowsOut,    1, 1.49, linear,       popin 87%
    animation = fadeIn,        1, 1.73, almostLinear
    animation = fadeOut,       1, 1.46, almostLinear
    animation = fade,          1, 3.03, quick
    animation = layers,        1, 3.81, easeOutQuint
    animation = layersIn,      1, 4,    easeOutQuint, fade
    animation = layersOut,     1, 1.5,  linear,       fade
    animation = fadeLayersIn,  1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces,    1, 1.94, almostLinear, fade
    animation = workspacesIn,  1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper      = -1
    disable_hyprland_logo        = false
    disable_hyprland_guiutils_check = true
}

# ── Input ───────────────────────────────────────────────────
input {
    kb_layout    = us
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll = false
    }
}


# ── Keybindings ─────────────────────────────────────────────
$mainMod = SUPER

bind = $mainMod,       Q,        exec,        $terminal
bind = $mainMod,       B,        exec,        $browser
bind = $mainMod SHIFT, B,        exec,        $browser2
bind = $mainMod,       F4,       killactive
bind = $mainMod,       M,        exit
bind = $mainMod,       E,        exec,        $fileManager
bind = $mainMod,       T,        togglefloating
bind = ALT, T, exec, ~/.config/hypr/scripts/theme-menu.sh
bind = $mainMod,       space,    exec,        ~/.config/rofi/launchers/type-2/launcher.sh || pkill rofi
bind = $mainMod,       P,        pseudo
bind = $mainMod,       J,        layoutmsg,   togglesplit
bind = $mainMod,       R,        exec,        ~/.config/waybar/scripts/launch.sh
bind = $mainMod,       W,        exec,        ~/.config/hypr/scripts/theme-switcher.sh
bind = $mainMod,       L,        exec,        wlogout
bind = $mainMod SHIFT, L,        exec,        hyprlock
bind = $mainMod,       V,        exec,        cliphist list | rofi -dmenu -theme ~/.config/rofi/clipboard.rasi | cliphist decode | wl-copy
bind = SUPER SHIFT,    V,        exec,        cliphist wipe

# Screenshots
bind = ,               Print,        exec, hyprshot -m region
bind = Shift,          Print,        exec, hyprshot -m window
bind = $mainMod SHIFT, Print,        exec, hyprshot -m output

# Screen recording
bind = $mainMod SHIFT, R, exec, pkill -SIGINT wf-recorder || wf-recorder -g "$(slurp)" -f ~/Videos/Screencasts/recording_$(date +%Y-%m-%d_%H%M%S).mp4

# Focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Move to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Mouse
bind  = $mainMod, mouse_down, workspace, e+1
bind  = $mainMod, mouse_up,   workspace, e-1
bindm = $mainMod, mouse:272,  movewindow
bindm = $mainMod, mouse:273,  resizewindow


