# =============================================================================
#  animations.conf — Smooth, clean animations
# =============================================================================

animations {
    enabled = yes

    # ── Bezier curves ─────────────────────────────────────────────────────────
    bezier = smoothOut,  0.36, 0, 0.66, -0.56
    bezier = smoothIn,   0.25, 1, 0.5, 1
    bezier = overshot,   0.05, 0.9, 0.1, 1.1
    bezier = snappy,     0.68, -0.55, 0.265, 1.55
    bezier = linear,     0, 0, 1, 1
    bezier = md3_decel,  0.05, 0.7, 0.1, 1

    # ── Windows ───────────────────────────────────────────────────────────────
    animation = windows,     1, 4,  md3_decel, popin 60%
    animation = windowsOut,  1, 3,  smoothOut, popin 60%
    animation = windowsMove, 1, 3,  snappy

    # ── Border ────────────────────────────────────────────────────────────────
    animation = border,      1, 10, linear
    animation = borderangle, 1, 30, linear, loop

    # ── Fade ──────────────────────────────────────────────────────────────────
    animation = fade,        1, 3,  smoothIn
    animation = fadeOut,     1, 3,  smoothOut

    # ── Workspaces ────────────────────────────────────────────────────────────
    animation = workspaces,  1, 4,  md3_decel, slidevert
}
