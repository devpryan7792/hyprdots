# =============================================================================
#  rules.conf — Window rules (Hyprland 0.54+ syntax)
# =============================================================================

# ── Floating ──────────────────────────────────────────────────────────────────
windowrule = float on, match:class pavucontrol
windowrule = float on, match:class blueman-manager
windowrule = float on, match:class nm-connection-editor
windowrule = float on, match:class xdg-desktop-portal-gtk
windowrule = float on, match:title Picture-in-Picture
windowrule = float on, match:title Open File
windowrule = float on, match:title Save File

# ── Sizing ────────────────────────────────────────────────────────────────────
windowrule = size 800 600, match:class pavucontrol
windowrule = center on, match:class pavucontrol

# ── Opacity ───────────────────────────────────────────────────────────────────
windowrule = opacity 0.9 0.85, match:class kitty
windowrule = opacity 0.9 0.85, match:class com.mitchellh.ghostty

# ── No screenshare (blacks out window in OBS/screenshare) ─────────────────────
# windowrule = noscreenshare on, match:class 1Password

# ── Workspace assignments (uncomment to use) ──────────────────────────────────
# windowrule = workspace 2, match:class firefox
# windowrule = workspace 3, match:class discord
