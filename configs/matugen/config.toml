# Matugen configuration — hyprdots by pryan
[config]
reload_gtk_theme = true
set_wallpaper = false

[[templates]]
input_path  = "~/.config/matugen/templates/hyprland-colors.conf"
output_path = "~/.config/matugen/templates/hyprland-colors.conf"

[[templates]]
input_path  = "~/.config/matugen/templates/ghostty-colors"
output_path = "~/.config/ghostty/theme"

[[templates]]
input_path  = "~/.config/matugen/templates/kitty-colors.conf"
output_path = "~/.config/kitty/current-theme.conf"

[[templates]]
input_path  = "~/.config/matugen/templates/waybar-colors.css"
output_path = "~/.config/waybar/colors.css"
